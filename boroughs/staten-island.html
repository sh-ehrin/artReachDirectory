<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staten Island — ArtReach</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <nav>
      <a href="../index.html" class="nav-logo">Art<span>Reach</span></a>
      <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="../about.html">About</a></li>
        <li><a href="../faq.html">Field Trip Guide</a></li>
        <li><a href="../contact.html">Contact</a></li>
      </ul>
    </nav>

    <!-- ── PAGE HERO ── -->
    <section class="page-hero">
      <a href="../index.html" class="detail-back">← Back to All Boroughs</a>
      <p class="page-hero-eyebrow">Browse by Institution Type</p>
      <!-- EDIT (per borough file): Borough name in headline -->
      <h1><em>Staten Island</em></h1>
    </section>

    <!-- ── MAIN CONTENT ── -->
    <section class="section">
      <!-- TYPE FILTER TABS -->
      <div class="type-tabs">
        <button class="type-tab active" onclick="filterType('all', this)">
          All
        </button>
        <button class="type-tab" onclick="filterType('museum', this)">
          Museums
        </button>
        <button class="type-tab" onclick="filterType('theatre', this)">
          Theatres
        </button>
        <button class="type-tab" onclick="filterType('music', this)">
          Music Halls
        </button>
      </div>

      <!-- ── VENUE GRID ──
       HOW TO ADD A VENUE:
       1. Copy one complete <a class="venue-card"> block below
       2. Paste it inside the .venue-grid div
       3. Change data-type to "museum", "theatre", or "music"
       4. Fill in all the fields 
       5. The card will automatically appear in the right filtered view-->

      <div class="venue-grid" id="venue-grid">
        <!-- ═══════════════════════════════════════
         VENUE CARD TEMPLATE — copy this block to add a new venue
         Change data-type to: museum | theatre | music
         ═══════════════════════════════════════ -->

        <!-- ADD MORE VENUE CARDS HERE — copy any card block above and edit the fields -->
      </div>
      <!-- end .venue-grid -->

      <!-- Empty state (shown when a filter has no results) -->
      <div
        id="empty-state"
        style="
          display: none;
          text-align: center;
          padding: 4rem 0;
          color: var(--taupe);
        "
      >
        <div style="font-size: 2.5rem; margin-bottom: 1rem">🏛</div>
        <p
          style="
            font-family: var(--font-display);
            font-size: 1.4rem;
            color: var(--navy);
          "
        >
          No venues yet in this category.
        </p>
        <p style="margin-top: 0.5rem; font-size: 0.88rem">
          Check back soon, or
          <a href="../contact.html" style="color: var(--blush)">suggest one</a>.
        </p>
      </div>
    </section>

    <footer>
      <strong>ArtReach</strong>
      © 2026 ArtReach. Connecting NYC students with culture.
    </footer>

    <script src="../script.js"></script>
  </body>
</html>
